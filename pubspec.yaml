name: gardenergrid

description: Soil analysis, crop recommendations, market pricing, and BLE sensor integration for gardeners.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^20.1.0
  flutter_blue_plus: ^2.3.8
  permission_handler: ^12.0.3
  http: ^1.2.0
  provider: ^6.1.2
  go_router: ^17.0.0
  file_picker: ^11.0.2
  image_picker: ^1.0.7
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  connectivity_plus: ^6.1.1
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.7.4
  sqflite: ^2.3.3+1
  path: ^1.9.0
  crypto: ^3.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/